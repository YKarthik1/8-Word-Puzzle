<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>8 Puzzle AI Solver</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>

<div class="container">

<h1>8 Puzzle AI Solver</h1>

<div class="card">

<label>Search Algorithm</label>

<select id="method">

<option value="bfs">Breadth First Search (BFS)</option>

<option value="dfs">Depth First Search (DFS)</option>

<option value="astar">A* Search</option>

</select>


<label>Initial State (use 0 as blank)</label>

<input id="initial" value="1 2 3 8 0 4 7 6 5">


<label>Goal State</label>

<input id="goal" value="2 8 1 0 4 3 7 6 5">


<button onclick="solve()">Solve Puzzle</button>

</div>


<div class="card">

<h3>Visualization</h3>

<div id="board"></div>

</div>


<div class="card">

<h3>Results</h3>

<div id="metrics"></div>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
